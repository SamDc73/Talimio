name: talimio

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: talimio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: talimio
      POSTGRES_USER: talimio
      POSTGRES_PASSWORD: talimio
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talimio -d talimio"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  talimio:
    image: ${TALIMIO_IMAGE:-ghcr.io/samdc73/talimio:dev}
    container_name: talimio
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://talimio:talimio@postgres:5432/talimio
      ENVIRONMENT: "development"
      MIGRATIONS_AUTO_APPLY: "true"
      LOCAL_STORAGE_PATH: /data/uploads
      FRONTEND_URL: http://localhost:${TALIMIO_PORT:-8497}
      CORS_ALLOW_ORIGINS: http://localhost:${TALIMIO_PORT:-8497}
      OLLAMA_API_BASE: http://ollama:11434
      PRIMARY_LLM_MODEL: ${PRIMARY_LLM_MODEL:-ollama/gpt-oss:20b}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-ollama/nomic-embed-text}
      RAG_EMBEDDING_OUTPUT_DIM: ${RAG_EMBEDDING_OUTPUT_DIM:-768}
    volumes:
      - talimio-uploads:/data/uploads
    ports:
      - "${TALIMIO_PORT:-8497}:8080"
    restart: unless-stopped

  # Local LLM service (comment out if you don't need localAI)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 30
    # GPU acceleration (optional)
    gpus: "all"

volumes:
  postgres-data:
  talimio-uploads:
  ollama-data:
