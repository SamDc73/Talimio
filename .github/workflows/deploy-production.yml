name: Deploy Production

on:
  push:
    branches: ["main"]
    paths:
      - backend/**
      - .github/workflows/deploy-production.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the backend image for Cloud Run
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- 1. THE SAFETY NET: NEON BRANCHING ---
      - name: Create Neon Preview Branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: deploy-check-${{ github.sha }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Rehearse Migrations on Preview Branch
        run: |
          docker run --rm \
            -e DATABASE_URL="${{ steps.neon.outputs.db_url }}" \
            -e MIGRATIONS_AUTO_APPLY=False \
            ${{ steps.meta.outputs.tags }} \
            uv run python -m src.database.migrate

      - name: Delete Preview Branch
        if: always() && steps.neon.outputs.branch_id != ''
        run: |
          npx -y neonctl@latest branches delete ${{ steps.neon.outputs.branch_id }} \
            --project-id ${{ vars.NEON_PROJECT_ID }} \
            --api-key ${{ secrets.NEON_API_KEY }}

      # --- 2. DEPLOYMENT TO GCP ---
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Production DB Migrations (Cloud Run Job)
        run: |
          gcloud run jobs update backend-migrator \
            --image ${{ steps.meta.outputs.tags }} \
            --region us-central1
          
          gcloud run jobs execute backend-migrator --wait --region us-central1

      - name: Deploy Cloud Run Service
        run: |
          gcloud run deploy backend-service \
            --image ${{ steps.meta.outputs.tags }} \
            --region us-central1 \
            --set-env-vars="MIGRATIONS_AUTO_APPLY=False"
